name: Test the deployment workflow
permissions:
  contents: read
on:
  workflow_dispatch:

env:
  DEV_SCRIPTS_DIR: ${{ github.workspace }}/vendor/publishpress/dev-workspace/scripts

jobs:
  deploy-wp-org:
    name: Deploy tagged release to WordPress.org
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # actions/checkout@v6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up PHP
        # shivammathur/setup-php@2.37.0
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: 8.3
          extensions: mbstring,xml,curl,zip,intl,bcmath,gettext,mysqli,phar,gd,iconv,yaml

      - name: Create root .env file
        run: |
          cp $GITHUB_WORKSPACE/.env.example $GITHUB_WORKSPACE/.env

      - name: Validate Composer configuration
        run: composer validate

      - name: Install Composer dependencies
        run: composer install

      - name: Show dev-workspace tool versions
        run: composer info:version

      - name: Add dev-workspace scripts to PATH
        run: echo "$DEV_SCRIPTS_DIR" >> "$GITHUB_PATH"

      - name: Build plugin package
        run: composer build

      - name: Read plugin metadata and version
        id: get-metadata
        run: composer deploy:metadata-github-output

      - name: Echo the output
        run: |
          echo "Plugin slug: ${{ steps.get-metadata.outputs.plugin-slug }}"
          echo "Plugin name: ${{ steps.get-metadata.outputs.plugin-name }}"
          echo "Plugin version: ${{ steps.get-metadata.outputs.version }}"
          echo "Plugin folder: ${{ steps.get-metadata.outputs.plugin-folder }}"

